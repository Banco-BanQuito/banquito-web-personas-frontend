name: Build, Push and Deploy to GKE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: project-47695a8e-7cb2-4352-af2
  GKE_CLUSTER: banquito-cluster-east
  GKE_LOCATION: us-east1
  AR_LOCATION: us-central1
  AR_REPOSITORY: banquito
  IMAGE_NAME: web-personas-frontend
  DEPLOYMENT_NAME: web-personas-frontend
  CONTAINER_NAME: web-personas-frontend
  NAMESPACE: banquito-frontend

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "$AR_LOCATION-docker.pkg.dev" --quiet
      - name: Build image
        run: |
          IMAGE="$AR_LOCATION-docker.pkg.dev/$PROJECT_ID/$AR_REPOSITORY/$IMAGE_NAME"
          docker build -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" .
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Push image
        run: |
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"
      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Deploy to GKE
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME $CONTAINER_NAME="$IMAGE:${{ github.sha }}" -n $NAMESPACE
          kubectl rollout status deployment/$DEPLOYMENT_NAME -n $NAMESPACE --timeout=300s
